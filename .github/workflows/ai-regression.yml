name: CI

# Blocking pre-deploy quality gate. Runs on every push to main and every PR:
# typecheck → the FULL test suite → production build. The full suite
# (scripts/*.test.ts) includes the security-critical suites — tenant-isolation,
# bypass-detection, rbac, authorization-coverage, security-hardening — plus the AI
# golden-fixture regression and all workflow tests, so a regression in any of them
# fails this job. `npm test` runs them once (no duplication); it is fast (<1s) — the
# build is the long pole.
#
# To make this HARD-STOP a production deploy (recommended): either
#   • GitHub → Settings → Branches → protect `main` → require the "verify" check, or
#   • Vercel → Project → Settings → Git → enable "Only build/deploy when checks pass".
# Without one of those, this is a visible signal but does not by itself block Vercel's
# auto-deploy.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Full test suite (tenancy, bypass-detection, rbac, authz, security, AI, workflows)
        run: npm test
      - name: Production build
        run: npm run build
