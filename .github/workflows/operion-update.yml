# Operion Update — reusable, controlled commit-transfer Preview workflow.
#
# SOURCE-OF-TRUTH copy (lives in jkissllc). The TARGET repo (e.g. supercharged) gets its own
# copy of THIS file + scripts/operion-apply.mjs when the owner wires that business live. It
# ONLY runs on manual workflow_dispatch — Operion dispatches it (flag-gated) with signed
# inputs; it never runs on push/PR, so it is inert while sitting in the repo. It applies the
# approved commit-transfer manifest, runs the gates, opens a PR, and reports a signed result.
# It NEVER merges the PR and NEVER deploys/promotes production.
name: Operion Update
run-name: "Operion ${{ inputs.updateId }} → ${{ inputs.targetBranch }}"

on:
  workflow_dispatch:
    inputs:
      deploymentRequestId: { description: "Operion job id", required: true, type: string }
      updateId:            { description: "PlatformUpdate key", required: true, type: string }
      sourceRepository:    { description: "source repo (owner/name)", required: false, type: string }
      sourceCommit:        { description: "source commit SHA", required: false, type: string }
      targetBranch:        { description: "work branch to create", required: true, type: string }
      executionStrategy:   { description: "commit_transfer | file_manifest | ai_adaptation", required: false, type: string, default: "commit_transfer" }
      promptTemplateVersion: { description: "prompt template version", required: false, type: string }

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: operion-update-${{ inputs.targetBranch }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      # This workflow is copied into each owner-approved target repository. Repository access
      # is therefore enforced by that repository's GitHub App installation and Actions
      # permissions; the workflow must not embed the source repository as a false allowlist.
      # Bind dispatch inputs through env so workflow-expression expansion can never become
      # shell source, then strictly constrain the only input used as a git ref.
      - name: Validate request
        env:
          DEPLOYMENT_REQUEST_ID: ${{ inputs.deploymentRequestId }}
          TARGET_BRANCH: ${{ inputs.targetBranch }}
        run: |
          if [ -z "$DEPLOYMENT_REQUEST_ID" ]; then
            echo "::error::missing deploymentRequestId"; exit 1
          fi
          if [ "${#TARGET_BRANCH}" -gt 128 ] || ! [[ "$TARGET_BRANCH" =~ ^operion/[a-z0-9][a-z0-9_-]*(/[a-z0-9][a-z0-9_-]*)*$ ]]; then
            echo "::error::targetBranch must be an operion/ path with lowercase alphanumeric, underscore, or hyphen segments"; exit 1
          fi
          echo "request validated for automation-owned branch"

      - name: Checkout target
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Create work branch
        env:
          TARGET_BRANCH: ${{ inputs.targetBranch }}
        run: |
          # Author as the owner's GitHub account — Vercel's git-author check only builds
          # previews whose author is a connected team account (no bot identity qualifies).
          git config user.name "ratchetnu"
          git config user.email "272044755+ratchetnu@users.noreply.github.com"
          git checkout -b "$TARGET_BRANCH" || git checkout "$TARGET_BRANCH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "24" }

      # Deterministic commit transfer: fetch the approved, signed manifest from Operion and
      # write exactly those files. Verifies each hash; aborts (non-zero) on any mismatch or if
      # nothing changed. NO AI. See scripts/operion-apply.mjs.
      - name: Apply update (Operion commit transfer)
        id: apply
        env:
          OPERION_CALLBACK_URL: ${{ secrets.OPERION_CALLBACK_URL }}
          OPERION_CALLBACK_SECRET: ${{ secrets.OPERION_CALLBACK_SECRET }}
          OPERION_JOB_ID: ${{ inputs.deploymentRequestId }}
          OPERION_APPLY_RESULT: apply-result.json
        run: node scripts/operion-apply.mjs

      - name: Install
        run: npm ci

      - name: Typecheck
        id: typecheck
        run: npx tsc --noEmit

      # Lint ONLY the transferred files — the target repo's pre-existing lint debt must not
      # fail an unrelated preview. (Typecheck + tests + build still run whole-repo.)
      - name: Lint (changed files)
        id: lint
        run: |
          CHANGED=$(git diff --name-only HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.mjs' | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then echo "linting: $CHANGED"; npx eslint $CHANGED; else echo "no lintable files changed"; fi

      - name: Test
        id: test
        run: npm test

      - name: Build
        id: build
        run: npm run build

      - name: Commit transferred files + push feature branch
        id: push
        if: success()
        env:
          DEPLOYMENT_REQUEST_ID: ${{ inputs.deploymentRequestId }}
          TARGET_BRANCH: ${{ inputs.targetBranch }}
          UPDATE_ID: ${{ inputs.updateId }}
        run: |
          git add -A -- ':!apply-result.json'   # keep the runner's result file out of the commit
          git commit -m "chore(operion): apply update $UPDATE_ID (job $DEPLOYMENT_REQUEST_ID)" || echo "nothing to commit"
          git push --force origin "$TARGET_BRANCH"   # automation-owned branch; retries overwrite cleanly
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        id: pr
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_REQUEST_ID: ${{ inputs.deploymentRequestId }}
          TARGET_BRANCH: ${{ inputs.targetBranch }}
          UPDATE_ID: ${{ inputs.updateId }}
        run: |
          EXISTING=$(gh pr list --head "$TARGET_BRANCH" --json number,url --jq '.[0]' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            NUM=$(echo "$EXISTING" | jq -r '.number'); URL=$(echo "$EXISTING" | jq -r '.url')
          else
            gh pr create --base main --head "$TARGET_BRANCH" \
              --title "Operion: $UPDATE_ID" \
              --body "Automated Operion commit-transfer preview for \`$UPDATE_ID\` (job $DEPLOYMENT_REQUEST_ID). Preview-only — do NOT merge until owner review in Operion." 2>/dev/null || true
            NUM=$(gh pr view "$TARGET_BRANCH" --json number --jq '.number' 2>/dev/null || echo "")
            URL=$(gh pr view "$TARGET_BRANCH" --json url --jq '.url' 2>/dev/null || echo "")
          fi
          echo "number=${NUM}" >> "$GITHUB_OUTPUT"; echo "url=${URL}" >> "$GITHUB_OUTPUT"

      # Report a signed, machine-readable result to Operion (HMAC-SHA256 over `${ts}.${body}`
      # = app/lib/platform/automation/callback.ts). The Vercel Preview is created by the target
      # project's git integration on branch push; Operion polls it server-side.
      - name: Report to Operion (signed)
        if: always()
        env:
          OPERION_CALLBACK_URL: ${{ secrets.OPERION_CALLBACK_URL }}
          OPERION_CALLBACK_SECRET: ${{ secrets.OPERION_CALLBACK_SECRET }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          COMMIT_SHA: ${{ steps.push.outputs.sha }}
          DEPLOYMENT_REQUEST_ID: ${{ inputs.deploymentRequestId }}
          JOB_STATUS: ${{ job.status }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          TARGET_BRANCH: ${{ inputs.targetBranch }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
        run: |
          if [ -z "$OPERION_CALLBACK_URL" ] || [ -z "$OPERION_CALLBACK_SECRET" ]; then
            echo "OPERION_CALLBACK_URL / OPERION_CALLBACK_SECRET not set — skipping callback"; exit 0
          fi
          APPLIED=0; SKIPPED=0; FAILEDN=0
          if [ -f apply-result.json ]; then
            APPLIED=$(jq -r '.applied // 0' apply-result.json); SKIPPED=$(jq -r '.skipped // 0' apply-result.json); FAILEDN=$(jq -r '.failed // 0' apply-result.json)
          fi
          STATUS="preview_ready"
          if [ "$APPLY_OUTCOME" = "failure" ]; then STATUS="apply_failed"
          elif [ "$TEST_OUTCOME" = "failure" ]; then STATUS="tests_failed"
          elif [ "$BUILD_OUTCOME" = "failure" ]; then STATUS="build_failed"
          elif [ "$JOB_STATUS" != "success" ]; then STATUS="preview_failed"; fi
          TP=false; [ "$TEST_OUTCOME" = "success" ] && TP=true
          BP=false; [ "$BUILD_OUTCOME" = "success" ] && BP=true
          LP=false; [ "$LINT_OUTCOME" = "success" ] && LP=true
          TS=$(date +%s000)
          BODY=$(jq -nc \
            --arg d "gh-${{ github.run_id }}" \
            --arg j "$DEPLOYMENT_REQUEST_ID" \
            --arg s "$STATUS" \
            --arg br "$TARGET_BRANCH" \
            --arg c "$COMMIT_SHA" \
            --arg run "${{ github.run_id }}" \
            --arg prn "$PR_NUMBER" \
            --arg prurl "$PR_URL" \
            --argjson tp "$TP" --argjson bp "$BP" --argjson lp "$LP" \
            --argjson ap "$APPLIED" --argjson sk "$SKIPPED" --argjson fl "$FAILEDN" \
            '{deliveryId:$d, jobId:$j, status:$s, branch:$br, commit:$c, workflowRunId:$run,
              pullRequestNumber:(if $prn == "" then null else ($prn | tonumber) end), pullRequestUrl:$prurl,
              result:{testsPassed:$tp, buildPassed:$bp, lintPassed:$lp, changedFiles:$ap, filesApplied:$ap, filesSkipped:$sk, filesFailed:$fl}}')
          SIG=$(printf '%s.%s' "$TS" "$BODY" | openssl dgst -sha256 -hmac "$OPERION_CALLBACK_SECRET" | sed 's/^.*= *//')
          curl -sSL -X POST "$OPERION_CALLBACK_URL" \
            -H "content-type: application/json" \
            -H "x-operion-timestamp: $TS" \
            -H "x-operion-signature: $SIG" \
            -d "$BODY" || echo "callback POST failed (non-fatal)"
